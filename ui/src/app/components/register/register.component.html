<div class="auth-container">
  <div class="auth-card">
    <h2>Create Account</h2>
    <p class="auth-subtitle">AI Financial Health Analyzer</p>

    <div *ngIf="error" class="alert alert-error">{{ error }}</div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="you@example.com" class="form-input" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Minimum 6 characters" class="form-input" />
    </div>

    <div class="form-group">
      <label>Mobile Number <span class="optional">(optional)</span></label>
      <input type="tel" [(ngModel)]="mobileNumber" placeholder="+919876543210" class="form-input" />
    </div>
    <p class="helper-text">You can also use this number later for OTP login.</p>
    <button (click)="onSubmit()" [disabled]="loading" class="btn-primary btn-full">
      {{ loading ? 'Creating account...' : 'Register' }}
    </button>

    <p class="auth-link">
      Already have an account?
      <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
