<div class="auth-container">
  <div class="auth-card">
    <h2>Sign In</h2>
    <p class="auth-subtitle">AI Financial Health Analyzer</p>

    <div *ngIf="error" class="alert alert-error">{{ error }}</div>
    <div *ngIf="success" class="alert alert-success">{{ success }}</div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="you@example.com" class="form-input" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Enter your password" class="form-input" />
    </div>

    <button (click)="onSubmit()" [disabled]="loading" class="btn-primary btn-full">
      {{ loading ? 'Signing in...' : 'Sign In' }}
    </button>

    <div class="auth-divider">
  <span>or</span>
</div>

<div class="google-wrapper">
  <div id="googleSignInButton"></div>
</div>

<div class="auth-divider">
  <span>or</span>
</div>

<h3 class="otp-title">Login with Mobile OTP</h3>

    <div class="form-group">
      <label>Mobile Number</label>
      <input type="tel" [(ngModel)]="mobileNumber" placeholder="+919876543210" class="form-input" />
    </div>

   <button (click)="sendOtp()" [disabled]="otpLoading" class="btn-secondary btn-full">
  {{ otpLoading ? 'Sending OTP...' : otpSent ? 'Resend OTP' : 'Send OTP' }}
</button>

    <div class="form-group" *ngIf="otpSent">
      <label>OTP</label>
      <input type="text" maxlength="6" [(ngModel)]="otp" placeholder="Enter 6-digit OTP" class="form-input" />
    </div>

    <button *ngIf="otpSent" (click)="verifyOtp()" [disabled]="otpLoading" class="btn-primary btn-full">
      {{ otpLoading ? 'Verifying...' : 'Verify OTP & Login' }}
    </button>

    <p class="auth-link">
      Don't have an account?
      <a routerLink="/register">Register here</a>
    </p>
  </div>
</div>
