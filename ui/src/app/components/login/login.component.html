<div class="auth-container">
  <div class="auth-card">
    <h2>Sign In</h2>
    <p class="auth-subtitle">AI Financial Health Analyzer</p>

    <!-- Error message -->
    <div *ngIf="error" class="alert alert-error">{{ error }}</div>

    <!-- Login form -->
    <div class="form-group">
      <label>Email</label>
      <input
        type="email"
        [(ngModel)]="email"
        placeholder="you@example.com"
        class="form-input"
      />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="Enter your password"
        class="form-input"
      />
    </div>

    <button
      (click)="onSubmit()"
      [disabled]="loading"
      class="btn-primary btn-full">
      {{ loading ? 'Signing in...' : 'Sign In' }}
    </button>

    <p class="auth-link">
      Don't have an account?
      <a routerLink="/register">Register here</a>
    </p>
  </div>
</div>
